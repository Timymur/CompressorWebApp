<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Журнал аварий</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<main class="app-shell">
    <section class="app-screen active">
        <div class="card w-100">
            <h1 class="card-title-main text-center mb-4">Журнал аварий</h1>
            <div class="event-item"
                 th:each="event : ${events}"
                th:attr="data-compressor-id=${compressor.id}"
                th:onclick="|window.location.href='/compressor/' + ${compressor.id}|"
                  >

                <h4 th:text="${event.parameter.parameterName}"></h4>
                <p th:text="${event.text}" style="white-space: pre-line;"></p>
                <p th:text="${event.user != null}
                            ? 'Ответственный: ' + ${event.user.lastName} + ' ' + ${event.user.firstName}
                            : 'Авария произошла на пересменке'"></p>
                <p th:text="${event.time} + '  '  + ${event.date}"></p>
            </div>
            <button type="button" class="btn w-100 auth-btn"
                    th:onclick="|window.location.href='/compressor/' + ${compressor.id}|">
                Назад
            </button>
        </div>

    </section>
</main>
</body>
</html>
