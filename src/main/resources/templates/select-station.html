<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Выбор станции</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<main class="app-shell">
    <section class="app-screen active">
        <div class="card">
            <div class="screen-content">
                <h1 class="card-title-main">Выберите станцию</h1>
                <form th:action="@{/select-station}" method="post">
                    <select name="stationId" class="form-select mb-3">
                        <option th:each="station : ${stations}"
                                th:value="${station.id}"
                                th:text="${station.city} + ' - ' + ${station.serialNumber}">
                        </option>
                    </select>
                    <button type="submit" class="btn w-100 auth-btn">Выбрать</button>
                </form>
                <a href="/" class="btn auth-btn">Отмена</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
